<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#12795a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Jendela Islam v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; color: #333; font-family: sans-serif; margin: 0; -webkit-tap-highlight-color: transparent; transition: 0.3s; user-select: none; }
        .top-header { background-color: #12795a; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; padding: 40px 24px 45px 24px; color: white; position: relative; box-shadow: 0 10px 30px rgba(18, 121, 90, 0.15); }
        .jam-text { font-size: 60px; font-weight: 800; line-height: 1.1; letter-spacing: -1px; }
        .icon-btn { width: 45px; height: 45px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; cursor: pointer; transition: 0.2s; }
        .icon-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.3); }
        .location-tag { background-color: #ef4444; color: white; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: bold; display: flex; align-items: center; gap: 6px; box-shadow: 0 4px 10px rgba(239, 68, 68, 0.4); cursor: pointer; transition: 0.2s; }
        .location-tag:active { transform: scale(0.95); }
        .sholat-item { background: rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 12px 2px; flex: 1; text-align: center; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .sholat-item.active { background: #ffcc00; color: #12795a; box-shadow: 0 0 20px rgba(255, 204, 0, 0.6); border: none; }
        .hak-cipta { text-align: center; padding: 40px 20px; color: #9ca3af; font-size: 13px; font-weight: bold; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="top-header">
        <div class="flex justify-between items-start">
            <div class="pt-2">
                <div id="jam" class="jam-text">00.00.00</div>
                <p id="tanggal" class="text-[15px] opacity-90 mt-2 font-medium">Memuat Tanggal...</p>
                <p class="text-yellow-400 font-bold text-[15px] mt-1">🌙 15 Syawal 1447 H</p>
            </div>
            <div class="flex flex-col items-end">
                <div class="icon-btn" onclick="toggleTheme()" id="btn-theme">
                    <i class="fas fa-moon text-yellow-400 text-xl"></i>
                </div>
            </div>
        </div>
        <div class="flex justify-end items-center mt-8 px-1">
            <div class="location-tag" onclick="gantiWilayah()">
                <i class="fas fa-map-marker-alt"></i> <span id="nama-kota">Memuat...</span>
            </div>
        </div>
        <div class="flex justify-between gap-2 mt-5">
            <div id="item-subuh" class="sholat-item"><div class="text-[9px] font-bold opacity-70 uppercase tracking-wide">Subuh</div><div id="waktu-subuh" class="text-[15px] font-extrabold mt-1">--:--</div></div>
            <div id="item-dzuhur" class="sholat-item"><div class="text-[9px] font-bold opacity-70 uppercase tracking-wide">Dzuhur</div><div id="waktu-dzuhur" class="text-[15px] font-extrabold mt-1">--:--</div></div>
            <div id="item-ashar" class="sholat-item"><div class="text-[9px] font-bold opacity-70 uppercase tracking-wide">Ashar</div><div id="waktu-ashar" class="text-[15px] font-extrabold mt-1">--:--</div></div>
            <div id="item-maghrib" class="sholat-item"><div class="text-[9px] font-bold uppercase tracking-wide">Maghrib</div><div id="waktu-maghrib" class="text-[15px] font-extrabold mt-1">--:--</div></div>
            <div id="item-isya" class="sholat-item"><div class="text-[9px] font-bold opacity-70 uppercase tracking-wide">Isya</div><div id="waktu-isya" class="text-[15px] font-extrabold mt-1">--:--</div></div>
        </div>
    </div>
    <div class="hak-cipta">© 2026 ikram-cyber</div>
    <audio id="audio-adzan" src="https://www.islamcan.com/audio/adhan/azan2.mp3" preload="none"></audio>
    <script>
        let lastAdzanPlayed = "";
        let zonaWaktu = "Asia/Jakarta";
        const audioAdzan = document.getElementById('audio-adzan');
        let kotaTersimpan = localStorage.getItem("kotaPilihan") || "Sumedang";
        function updateJam() {
            const now = new Date();
            const optionsJam = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false, timeZone: zonaWaktu };
            const timeString = new Intl.DateTimeFormat('id-ID', optionsJam).format(now).replace(/\./g, ':');
            const [h, m, s] = timeString.split(':');
            const waktuSekarang = h + ":" + m;
            document.getElementById('jam').innerText = h + "." + m + "." + s;
            document.getElementById('tanggal').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric', timeZone: zonaWaktu });
            const jadwal = [
                document.getElementById('waktu-subuh').innerText,
                document.getElementById('waktu-dzuhur').innerText,
                document.getElementById('waktu-ashar').innerText,
                document.getElementById('waktu-maghrib').innerText,
                document.getElementById('waktu-isya').innerText
            ];
            if (jadwal.includes(waktuSekarang) && s === '00' && lastAdzanPlayed !== waktuSekarang) {
                audioAdzan.play().catch(e => console.log("Autoplay diblokir browser"));
                lastAdzanPlayed = waktuSekarang;
            }
            updateActiveStatus(waktuSekarang);
        }
        function toMinutes(t) {
            if (!t || t.includes("-")) return -1;
            const [h, m] = t.split(':').map(Number);
            return h * 60 + m;
        }
        function updateActiveStatus(waktuSekarang) {
            const currentMin = toMinutes(waktuSekarang);
            const times = {
                subuh: toMinutes(document.getElementById('waktu-subuh').innerText),
                dzuhur: toMinutes(document.getElementById('waktu-dzuhur').innerText),
                ashar: toMinutes(document.getElementById('waktu-ashar').innerText),
                maghrib: toMinutes(document.getElementById('waktu-maghrib').innerText),
                isya: toMinutes(document.getElementById('waktu-isya').innerText)
            };
            const ids = ['item-subuh', 'item-dzuhur', 'item-ashar', 'item-maghrib', 'item-isya'];
            ids.forEach(id => document.getElementById(id).classList.remove('active'));
            if (times.subuh === -1) return;
            if (currentMin >= times.isya || currentMin < times.subuh) {
                document.getElementById('item-isya').classList.add('active');
            } else if (currentMin >= times.maghrib) {
                document.getElementById('item-maghrib').classList.add('active');
            } else if (currentMin >= times.ashar) {
                document.getElementById('item-ashar').classList.add('active');
            } else if (currentMin >= times.dzuhur) {
                document.getElementById('item-dzuhur').classList.add('active');
            } else if (currentMin >= times.subuh) {
                document.getElementById('item-subuh').classList.add('active');
            }
        }
        setInterval(updateJam, 1000);
        async function muatJadwal(kota) {
            document.getElementById('nama-kota').innerText = "Mencari...";
            try {
                let today = new Date();
                let dd = String(today.getDate()).padStart(2, '0');
                let mm = String(today.getMonth() + 1).padStart(2, '0');
                let yyyy = today.getFullYear();
                let response = await fetch(`https://api.aladhan.com/v1/timingsByCity/${dd}-${mm}-${yyyy}?city=${kota}&country=Indonesia&method=20`);
                let data = await response.json();
                if(data.code === 200) {
                    let timings = data.data.timings;
                    zonaWaktu = data.data.meta.timezone;
                    document.getElementById('waktu-subuh').innerText = timings.Fajr;
                    document.getElementById('waktu-dzuhur').innerText = timings.Dhuhr;
                    document.getElementById('waktu-ashar').innerText = timings.Asr;
                    document.getElementById('waktu-maghrib').innerText = timings.Maghrib;
                    document.getElementById('waktu-isya').innerText = timings.Isha;
                    let namaKotaKapital = kota.charAt(0).toUpperCase() + kota.slice(1).toLowerCase();
                    document.getElementById('nama-kota').innerText = namaKotaKapital;
                    localStorage.setItem("kotaPilihan", namaKotaKapital);
                    updateJam();
                }
            } catch (e) {
                document.getElementById('nama-kota').innerText = kotaTersimpan;
            }
        }
        async function gantiWilayah() {
            let kotaBaru = prompt("Masukkan nama Kota/Kabupaten:", kotaTersimpan);
            if (kotaBaru && kotaBaru.trim() !== "") {
                muatJadwal(kotaBaru.trim());
                kotaTersimpan = kotaBaru.trim();
            }
        }
        muatJadwal(kotaTersimpan);
        let isDark = false;
        function toggleTheme() {
            const btn = document.getElementById('btn-theme'); isDark = !isDark;
            btn.innerHTML = isDark ? '<i class="fas fa-sun text-yellow-400 text-xl"></i>' : '<i class="fas fa-moon text-yellow-400 text-xl"></i>';
            document.body.style.backgroundColor = isDark ? "#111827" : "#f8f9fa";
        }
    </script>
</body>
</html>
